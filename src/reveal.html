<!doctype html>
<meta charset="utf-8">

<script async type="module">
    import {default as Reveal} from "https://esm.sh/reveal.js@6.0.0?target=esnext";
    import {default as RevealHighlight} from "https://esm.sh/reveal.js@6.0.0/dist/plugin/highlight.js?target=esnext";
    import {default as RevealMarkdown} from "https://esm.sh/reveal.js@6.0.0/dist/plugin/markdown.js?target=esnext";
    import {default as RevealSearch} from "https://esm.sh/reveal.js@6.0.0/dist/plugin/search.js?target=esnext";
    import {default as RevealNotes} from "https://esm.sh/reveal.js@6.0.0/dist/plugin/notes.js?target=esnext";
    import {default as RevealMath} from "https://esm.sh/reveal.js@6.0.0/dist/plugin/math.js?target=esnext";
    import {default as RevealZoom} from "https://esm.sh/reveal.js@6.0.0/dist/plugin/zoom.js?target=esnext";

    /** @type {new (target: Element, option?: {hash?: boolean; plugins?: unknown[];}) => {initialize(): Promise<void>;}} */
    const _Reveal = Reveal;
    /** @type {unknown} */
    const _RevealHighlight = RevealHighlight;
    /** @type {unknown} */
    const _RevealMarkdown = RevealMarkdown;
    /** @type {unknown} */
    const _RevealSearch = RevealSearch;
    /** @type {unknown} */
    const _RevealNotes = RevealNotes;
    /** @type {unknown} */
    const _RevealMath = RevealMath;
    /** @type {unknown} */
    const _RevealZoom = RevealZoom;

    await new _Reveal(document.getElementById("reveal"), {
        hash: true,
        plugins: [
            _RevealHighlight,
            _RevealMarkdown,
            _RevealSearch,
            _RevealNotes,
            _RevealMath,
            _RevealZoom
        ]
    }).initialize();
</script>

<style>
    @import "https://esm.sh/reveal.js@6.0.0/dist/reveal.css";
    @import "https://esm.sh/reveal.js@6.0.0/dist/theme/white.css";
</style>

<div class="reveal" id="reveal">
    <div class="slides">
        <section data-markdown>
            # Test Page 1
            - 1
            - 2
            - 3
        </section>

        <section data-markdown>
            # Test Page 2
            - 4
            - 5
            - 6
        </section>
    </div>
</div>
