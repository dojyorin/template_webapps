<!doctype html>
<meta charset="utf-8">

<script async type="module">
    /**
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function digest(data) {
        return new Uint8Array(await crypto.subtle.digest("SHA-256", data));
    }

    /**
     * @return {Promise<Record<keyof CryptoKeyPair, Uint8Array<ArrayBuffer>>>}
     */
    async function generateKeyX25519() {
        /** @satisfies {CryptoKeyPair} */
        const {publicKey, privateKey} = await crypto.subtle.generateKey("X25519", true, ["deriveKey"]);

        return {
            publicKey: new Uint8Array(await crypto.subtle.exportKey("spki", publicKey)),
            privateKey: new Uint8Array(await crypto.subtle.exportKey("pkcs8", privateKey))
        };
    }

    /**
     * @return {Promise<Record<keyof CryptoKeyPair, Uint8Array<ArrayBuffer>>>}
     */
    async function generateKeyEd25519() {
        /** @satisfies {CryptoKeyPair} */
        const {publicKey, privateKey} = await crypto.subtle.generateKey("Ed25519", true, ["sign"]);

        return {
            publicKey: new Uint8Array(await crypto.subtle.exportKey("spki", publicKey)),
            privateKey: new Uint8Array(await crypto.subtle.exportKey("pkcs8", privateKey))
        };
    }

    /**
     * @param {string} password
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function encryptPassword(password, data) {
        const nonce = crypto.getRandomValues(new Uint8Array(28));

        const body = await crypto.subtle.encrypt({
            name: "ChaCha20-Poly1305",
            iv: nonce.subarray(16)
        }, await crypto.subtle.deriveKey({
            name: "Argon2id",
            memory: 65536,
            passes: 1,
            parallelism: 4,
            nonce: nonce.subarray(0, 16)
        }, await crypto.subtle.importKey("raw-secret", new TextEncoder().encode(password), "Argon2id", false, ["deriveKey"]), "ChaCha20-Poly1305", false, ["encrypt"]), data);

        const output = new Uint8Array(nonce.byteLength + body.byteLength);
        output.set(nonce, 0);
        output.set(new Uint8Array(body), nonce.byteLength);

        return output;
    }

    /**
     * @param {Uint8Array<ArrayBuffer>} key
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function encryptSecret(key, data) {
        const nonce = crypto.getRandomValues(new Uint8Array(12));

        const body = await crypto.subtle.encrypt({
            name: "ChaCha20-Poly1305",
            iv: nonce
        }, await crypto.subtle.importKey("raw-secret", key, "ChaCha20-Poly1305", false, ["encrypt"]), data);

        const output = new Uint8Array(nonce.byteLength + body.byteLength);
        output.set(nonce, 0);
        output.set(new Uint8Array(body), nonce.byteLength);

        return output;
    }

    /**
     * @param {Uint8Array<ArrayBuffer>} privateKey
     * @param {Uint8Array<ArrayBuffer>} publicKey
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function encryptX25519(privateKey, publicKey, data) {
        const nonce = crypto.getRandomValues(new Uint8Array(12));

        const body = await crypto.subtle.encrypt({
            name: "ChaCha20-Poly1305",
            iv: nonce
        }, await crypto.subtle.deriveKey({
            name: "X25519",
            public: await crypto.subtle.importKey("spki", publicKey, "X25519", false, [])
        }, await crypto.subtle.importKey("pkcs8", privateKey, "X25519", false, ["deriveKey"]), "ChaCha20-Poly1305", false, ["encrypt"]), data);

        const output = new Uint8Array(nonce.byteLength + body.byteLength);
        output.set(nonce, 0);
        output.set(new Uint8Array(body), nonce.byteLength);

        return output;
    }

    /**
     * @param {string} password
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function decryptPassword(password, data) {
        const nonce = data.subarray(0, 28);

        const body = await crypto.subtle.decrypt({
            name: "ChaCha20-Poly1305",
            iv: nonce.subarray(16)
        }, await crypto.subtle.deriveKey({
            name: "Argon2id",
            memory: 65536,
            passes: 1,
            parallelism: 4,
            nonce: nonce.subarray(0, 16)
        }, await crypto.subtle.importKey("raw-secret", new TextEncoder().encode(password), "Argon2id", false, ["deriveKey"]), "ChaCha20-Poly1305", false, ["decrypt"]), data.subarray(nonce.byteLength));

        return new Uint8Array(body);
    }

    /**
     * @param {Uint8Array<ArrayBuffer>} key
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function decryptSecret(key, data) {
        const nonce = data.subarray(0, 12);

        const body = await crypto.subtle.decrypt({
            name: "ChaCha20-Poly1305",
            iv: nonce
        }, await crypto.subtle.importKey("raw-secret", key, "ChaCha20-Poly1305", false, ["decrypt"]), data.subarray(nonce.byteLength));

        return new Uint8Array(body);
    }

    /**
     * @param {Uint8Array<ArrayBuffer>} privateKey
     * @param {Uint8Array<ArrayBuffer>} publicKey
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function decryptX25519(privateKey, publicKey, data) {
        const nonce = data.subarray(0, 12);

        const body = await crypto.subtle.decrypt({
            name: "ChaCha20-Poly1305",
            iv: nonce
        }, await crypto.subtle.deriveKey({
            name: "X25519",
            public: await crypto.subtle.importKey("spki", publicKey, "X25519", false, [])
        }, await crypto.subtle.importKey("pkcs8", privateKey, "X25519", false, ["deriveKey"]), "ChaCha20-Poly1305", false, ["decrypt"]), data.subarray(nonce.byteLength));

        return new Uint8Array(body);
    }

    /**
     * @param {Uint8Array<ArrayBuffer>} privateKey
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<Uint8Array<ArrayBuffer>>}
     */
    async function sign(privateKey, data) {
        const body = await crypto.subtle.sign("Ed25519", await crypto.subtle.importKey("pkcs8", privateKey, "Ed25519", false, ["sign"]), data);

        return new Uint8Array(body);
    }

    /**
     * @param {Uint8Array<ArrayBuffer>} publicKey
     * @param {Uint8Array<ArrayBuffer>} sign
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {Promise<boolean>}
     */
    async function verify(publicKey, sign, data) {
        const body = await crypto.subtle.verify("Ed25519", await crypto.subtle.importKey("spki", publicKey, "Ed25519", false, ["verify"]), sign, data);

        return body;
    }

    /**
     * @param {Uppercase<string>} name
     * @param {Uint8Array<ArrayBuffer>} data
     * @return {string}
     */
    function enpem(name, data) {
        return `-----BEGIN ${name}-----\n${data.toBase64()}\n-----END ${name}-----`;
    }

    /**
     * @param {string} data
     * @return {Uint8Array<ArrayBuffer>}
     */
    function depem(data) {
        return Uint8Array.fromBase64(data.trim().replaceAll("\r", "").split("\n").slice(1, -1).join(""));
    }

    /**
     * @param {number} size
     * @return {Uint8Array<ArrayBuffer>}
     */
    function _dummy(size) {
        return new Uint8Array(new Float32Array(size / 4).map(() => Math.random()).buffer);
    }

    const binary = _dummy(1024 ** 2);
    const password = "foobar";
    const passkey = _dummy(32);

    const hash = await digest(binary);
    const encryptKey = await generateKeyX25519();
    const signKey = await generateKeyEd25519();
    const encryptPasswordResult = await encryptPassword(password, binary);
    const encryptSecretResult = await encryptSecret(passkey, binary);
    const encryptX25519Result = await encryptX25519(encryptKey.privateKey, encryptKey.publicKey, binary);
    const decryptPasswordResult = await decryptPassword(password, encryptPasswordResult);
    const decryptSecretResult = await decryptSecret(passkey, encryptSecretResult);
    const decryptX25519Result = await decryptX25519(encryptKey.privateKey, encryptKey.publicKey, encryptX25519Result);
    const signResult = await sign(signKey.privateKey, binary);
    const verifyResult = await verify(signKey.publicKey, signResult, binary);
    const enpemPrivateKey = enpem("PRIVATE KEY", encryptKey.privateKey);
    const enpemPublicKey = enpem("PUBLIC KEY", encryptKey.publicKey);
    const depemPrivateKey = depem(enpemPrivateKey);
    const depemPublicKey = depem(enpemPublicKey);

    console.log(hash);
    console.log(encryptKey);
    console.log(signKey);
    console.log(encryptPasswordResult);
    console.log(encryptSecretResult);
    console.log(encryptX25519Result);
    console.log(decryptPasswordResult);
    console.log(decryptSecretResult);
    console.log(decryptX25519Result);
    console.log(signResult);
    console.log(verifyResult);
    console.log(enpemPrivateKey);
    console.log(enpemPublicKey);
    console.log(depemPrivateKey);
    console.log(depemPublicKey);
</script>
