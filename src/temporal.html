<!doctype html>
<meta charset="utf-8">

<script async type="module">
    const unixtime = Number(Temporal.Now.instant().epochNanoseconds / 1000000000n);
    const iso = Temporal.Now.zonedDateTimeISO().toString({
        smallestUnit: "second",
        offset: "auto",
        timeZoneName: "never",
        calendarName: "never"
    });

    console.log(unixtime);
    console.log(iso);
</script>
